services:
  db:
    image: mariadb:11.4
    container_name: promptpilot_db
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ai_auto_teaching}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-app}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mariadb_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptpilot_web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://app:app@db:3306/ai_auto_teaching}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-string}
      LESSON_TOKEN_SECRET: ${LESSON_TOKEN_SECRET:-replace-with-a-different-long-random-string}
      POLICY_VERSION: ${POLICY_VERSION:-v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

volumes:
  mariadb_data:
  web_node_modules:
